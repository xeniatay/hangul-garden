<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangul Garden</title>
<style>
/* ============================================================
   1. CSS VARIABLES — Design System
   ============================================================ */
:root {
  --lavender-50:  #f5f3ff;
  --lavender-100: #ede9fe;
  --lavender-200: #ddd6fe;
  --lavender-300: #c4b5fd;
  --lavender-400: #a78bfa;
  --iris:         #7c3aed;
  --wisteria:     #8b5cf6;
  --sage:         #7c9e87;
  --mint:         #a8d5b5;
  --ink:          #1e1b2e;
  --ink-soft:     #4a4565;
  --surface:      #faf9ff;
  --surface-card: #ffffff;
  --border:       rgba(167,139,250,0.18);
  --shadow-soft:  0 4px 24px rgba(124,58,237,0.07);
  --shadow-card:  0 8px 40px rgba(124,58,237,0.10);
  --radius-card:  20px;
  --radius-btn:   12px;
  --text-primary:  var(--ink);
  --text-secondary:var(--ink-soft);
  --text-accent:   var(--wisteria);
  --transition: 0.22s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --surface:       #13101f;
  --surface-card:  #1e1929;
  --border:        rgba(167,139,250,0.13);
  --shadow-soft:   0 4px 24px rgba(0,0,0,0.3);
  --shadow-card:   0 8px 40px rgba(0,0,0,0.4);
  --text-primary:  #e9e5ff;
  --text-secondary:#a89fd4;
  --lavender-50:   #1e1929;
  --lavender-100:  #261e3a;
  --lavender-200:  #352a4f;
  --ink:           #e9e5ff;
  --ink-soft:      #a89fd4;
}

/* ============================================================
   2. RESET & BASE
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;scroll-behavior:smooth;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:var(--surface);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;position:relative;
}

/* ============================================================
   3. BACKGROUND BLOBS
   ============================================================ */
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;
  animation:blobDrift 22s ease-in-out infinite alternate;}
.blob-1{width:520px;height:520px;background:var(--lavender-300);top:-10%;left:-8%;animation-duration:24s;}
.blob-2{width:380px;height:380px;background:var(--mint);bottom:5%;right:-5%;animation-duration:30s;animation-delay:-8s;}
.blob-3{width:280px;height:280px;background:var(--lavender-400);top:40%;right:15%;animation-duration:20s;animation-delay:-14s;}
[data-theme="dark"] .blob{opacity:0.09;}
@keyframes blobDrift{
  0%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,30px) scale(0.97);}
  100%{transform:translate(15px,10px) scale(1.03);}
}

/* ============================================================
   4. LAYOUT
   ============================================================ */
#app{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 16px 60px;}

/* ============================================================
   5. HEADER
   ============================================================ */
.header{padding:28px 0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.header-brand{display:flex;align-items:center;gap:10px;}
.brand-title{font-size:1.35rem;font-weight:700;letter-spacing:-0.02em;color:var(--wisteria);}
.brand-sub{font-size:0.72rem;color:var(--text-secondary);letter-spacing:0.06em;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:14px;}
.garden-badge{display:flex;align-items:center;gap:6px;background:var(--lavender-100);border:1px solid var(--border);
  border-radius:30px;padding:6px 14px;font-size:0.78rem;color:var(--wisteria);font-weight:600;}
.due-badge{background:var(--lavender-200);border-radius:20px;padding:4px 10px;font-size:0.72rem;color:var(--iris);font-weight:700;cursor:pointer;}
.icon-btn{background:var(--lavender-100);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background var(--transition),box-shadow var(--transition);color:var(--wisteria);}
.icon-btn:hover{background:var(--lavender-200);box-shadow:var(--shadow-soft);}

/* ============================================================
   6. TABS
   ============================================================ */
.tabs{display:flex;gap:6px;background:var(--lavender-100);border-radius:14px;padding:5px;margin-bottom:22px;}
.tab{flex:1;padding:9px 14px;border:none;border-radius:10px;background:transparent;
  color:var(--text-secondary);font-size:0.82rem;font-weight:600;cursor:pointer;
  transition:background var(--transition),color var(--transition),box-shadow var(--transition);letter-spacing:0.01em;}
.tab.active{background:var(--surface-card);color:var(--wisteria);box-shadow:0 2px 8px rgba(124,58,237,0.12);}
.tab:hover:not(.active){color:var(--iris);}

/* ============================================================
   7. DECK SELECTOR
   ============================================================ */
.deck-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.deck-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:30px;
  background:var(--surface-card);color:var(--text-secondary);font-size:0.78rem;font-weight:600;
  cursor:pointer;transition:all var(--transition);}
.deck-btn.active{background:var(--lavender-200);border-color:var(--lavender-300);color:var(--iris);}
.deck-btn:hover:not(.active){border-color:var(--lavender-300);color:var(--wisteria);}

/* ============================================================
   8. PROGRESS BAR
   ============================================================ */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.progress-bar-wrap{flex:1;height:6px;background:var(--lavender-200);border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--lavender-400),var(--wisteria));
  border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.progress-label{font-size:0.74rem;color:var(--text-secondary);font-weight:600;white-space:nowrap;}

/* ============================================================
   9. QUESTION CARD
   ============================================================ */
.card-wrap{margin-bottom:18px;}
.question-card{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);padding:40px 32px 32px;text-align:center;position:relative;min-height:140px;}
@keyframes cardEnter{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.card-deck-tag{position:absolute;top:16px;left:20px;font-size:0.68rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--text-secondary);opacity:0.7;}
.card-audio-btn{position:absolute;top:14px;right:18px;background:var(--lavender-100);
  border:1px solid var(--border);border-radius:8px;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--wisteria);
  transition:background var(--transition);}
.card-audio-btn:hover{background:var(--lavender-200);}
.card-korean{font-size:82px;line-height:1.1;font-weight:300;color:var(--text-primary);
  letter-spacing:-0.01em;margin:12px 0 8px;
  font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
  text-shadow:0 2px 16px rgba(124,58,237,0.06);}
.card-hint{font-size:0.8rem;color:var(--text-secondary);margin-top:4px;}

/* ============================================================
   10. OPTIONS
   ============================================================ */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.option-btn{background:var(--lavender-50);border:1.5px solid var(--border);border-radius:var(--radius-btn);
  padding:14px 18px;font-size:0.95rem;font-weight:500;color:var(--text-primary);cursor:pointer;
  transition:all var(--transition);text-align:left;line-height:1.4;}
.option-btn:hover:not(:disabled){background:var(--lavender-100);border-color:var(--lavender-300);
  transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,58,237,0.1);}
.option-btn.correct{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#6ee7b7;color:#065f46;}
.option-btn.wrong{background:linear-gradient(135deg,#fee2e2,#fecaca);border-color:#fca5a5;color:#991b1b;
  animation:shakeCard 0.4s ease;}
.option-btn:disabled{cursor:default;}
@keyframes shakeCard{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-7px);}
  40%{transform:translateX(7px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(4px);}
}

/* ============================================================
   11. FEEDBACK CARD
   ============================================================ */
.feedback-card{background:var(--lavender-50);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;margin-top:14px;position:relative;overflow:hidden;}
.feedback-card.correct-fb{border-color:#6ee7b7;background:#f0fdf4;}
.feedback-card.wrong-fb{border-color:#fca5a5;background:#fff5f5;}
[data-theme="dark"] .feedback-card.correct-fb{background:#0d2a1c;border-color:#2d6a4f;}
[data-theme="dark"] .feedback-card.wrong-fb{background:#2a0d0d;border-color:#6a2d2d;}
.feedback-title{font-size:0.9rem;font-weight:700;margin-bottom:6px;}
.feedback-card.correct-fb .feedback-title{color:#059669;}
.feedback-card.wrong-fb .feedback-title{color:#dc2626;}
.feedback-explanation{font-size:0.83rem;color:var(--text-secondary);line-height:1.6;}
.feedback-breakdown{margin-top:10px;padding:10px 12px;background:var(--surface-card);
  border-radius:8px;font-family:monospace;font-size:0.82rem;color:var(--text-primary);line-height:1.9;}
.feedback-examples{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
.example-chip{background:var(--lavender-100);border-radius:6px;padding:4px 10px;
  font-size:0.8rem;color:var(--wisteria);font-weight:600;
  font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;}
.bloom-ripple::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at center,rgba(167,139,250,0.25) 0%,transparent 70%);
  animation:bloomRipple 0.7s ease-out forwards;}
@keyframes bloomRipple{0%{opacity:1;}100%{opacity:0;}}

/* ============================================================
   12. NAVIGATION
   ============================================================ */
.nav-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.nav-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--lavender-100);
  border:1px solid var(--border);border-radius:var(--radius-btn);font-size:0.8rem;font-weight:600;
  color:var(--text-secondary);cursor:pointer;transition:all var(--transition);}
.nav-btn:hover{background:var(--lavender-200);color:var(--iris);}
.nav-btn.primary{background:linear-gradient(135deg,var(--lavender-300),var(--wisteria));color:#fff;border-color:transparent;}
.nav-btn.primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,58,237,0.25);}

/* ============================================================
   13. READING DRILL
   ============================================================ */
.drill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
.drill-card{background:var(--surface-card);border:1.5px solid var(--border);border-radius:14px;
  padding:20px 14px 16px;text-align:center;cursor:pointer;transition:all var(--transition);position:relative;}
.drill-card:hover{box-shadow:var(--shadow-card);transform:translateY(-2px);}
.drill-korean{font-size:38px;font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
  color:var(--text-primary);margin-bottom:6px;}
.drill-roman{font-size:0.82rem;color:var(--wisteria);font-weight:600;min-height:20px;transition:opacity 0.2s;}
.drill-roman.hidden{opacity:0;}
.drill-rating{display:flex;gap:6px;justify-content:center;margin-top:10px;}
.rating-btn{padding:3px 9px;border:1px solid var(--border);border-radius:20px;font-size:0.7rem;
  font-weight:700;cursor:pointer;transition:all var(--transition);background:var(--lavender-50);color:var(--text-secondary);}
.rating-btn.easy-r{border-color:#6ee7b7;color:#059669;}
.rating-btn.medium-r{border-color:var(--lavender-300);color:var(--wisteria);}
.rating-btn.hard-r{border-color:#fca5a5;color:#dc2626;}
.rating-btn:hover{transform:scale(1.07);}
.drill-controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.reveal-btn{padding:10px 20px;background:linear-gradient(135deg,var(--lavender-300),var(--wisteria));
  border:none;border-radius:var(--radius-btn);color:#fff;font-weight:700;font-size:0.85rem;
  cursor:pointer;transition:opacity var(--transition);}
.reveal-btn:hover{opacity:0.88;}
.difficulty-select{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius-btn);
  background:var(--surface-card);color:var(--text-primary);font-size:0.82rem;cursor:pointer;}

/* ============================================================
   14. SPEED ROUND
   ============================================================ */
.speed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.speed-timer{font-size:2rem;font-weight:700;color:var(--wisteria);font-variant-numeric:tabular-nums;}
.speed-counter{font-size:0.85rem;color:var(--text-secondary);}
.speed-card{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);padding:40px 24px 28px;text-align:center;animation:cardEnter 0.2s ease both;}
.speed-korean{font-size:90px;font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
  font-weight:300;color:var(--text-primary);margin-bottom:24px;}
.speed-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.speed-summary{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);padding:40px 30px;text-align:center;}
.speed-summary h2{font-size:1.6rem;margin-bottom:8px;color:var(--wisteria);}
.summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:28px 0;}
.stat-box{background:var(--lavender-50);border:1px solid var(--border);border-radius:14px;padding:18px 10px;}
.stat-val{font-size:2rem;font-weight:700;color:var(--wisteria);}
.stat-lbl{font-size:0.72rem;color:var(--text-secondary);margin-top:2px;text-transform:uppercase;letter-spacing:0.05em;}

/* ============================================================
   15. GARDEN
   ============================================================ */
.garden-panel{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-card);
  padding:26px 24px;margin-bottom:22px;box-shadow:var(--shadow-soft);}
.garden-title{font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-secondary);margin-bottom:14px;}
.garden-svg-wrap{width:100%;overflow:hidden;border-radius:10px;
  background:linear-gradient(160deg,var(--lavender-50) 0%,#eefaf2 100%);padding:14px 10px 6px;}
[data-theme="dark"] .garden-svg-wrap{background:linear-gradient(160deg,var(--lavender-100) 0%,#0d2018 100%);}

/* ============================================================
   16. SETTINGS
   ============================================================ */
.settings-overlay{position:fixed;inset:0;z-index:100;background:rgba(30,27,46,0.45);
  backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.settings-panel{background:var(--surface-card);border:1px solid var(--border);border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);padding:32px 28px;width:min(420px,95vw);
  animation:cardEnter 0.25s ease;}
.settings-panel h2{font-size:1.1rem;margin-bottom:22px;color:var(--text-primary);}
.setting-row{display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);}
.setting-row:last-of-type{border-bottom:none;}
.setting-label{font-size:0.88rem;color:var(--text-primary);}
.setting-sub{font-size:0.72rem;color:var(--text-secondary);margin-top:2px;}
.toggle{width:46px;height:26px;border-radius:99px;background:var(--lavender-200);cursor:pointer;
  position:relative;transition:background 0.2s;border:none;}
.toggle.on{background:var(--wisteria);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.toggle.on::after{transform:translateX(20px);}
.danger-btn{padding:9px 16px;border-radius:10px;border:1.5px solid #fca5a5;background:transparent;
  color:#dc2626;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all var(--transition);
  margin-top:18px;width:100%;}
.danger-btn:hover{background:#fee2e2;}
.close-btn{margin-top:16px;width:100%;padding:10px;border-radius:10px;
  border:1px solid var(--border);background:var(--lavender-100);color:var(--text-secondary);
  font-size:0.85rem;font-weight:600;cursor:pointer;}
.close-btn:hover{background:var(--lavender-200);}

/* ============================================================
   17. UTILITY
   ============================================================ */
.hidden{display:none!important;}
.section{display:none;}
.section.active{display:block;}
.text-center{text-align:center;}

/* ============================================================
   18. RESPONSIVE
   ============================================================ */
@media(max-width:540px){
  .card-korean{font-size:60px;}
  .speed-korean{font-size:68px;}
  .options-grid{grid-template-columns:1fr;}
  .speed-options{grid-template-columns:1fr;}
  .summary-stats{grid-template-columns:1fr;}
  .tabs .tab{font-size:0.72rem;padding:8px 6px;}
  .question-card{padding:30px 16px 24px;}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
}
/* Missing classes */
.drill-item{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-card);
  padding:20px 16px;text-align:center;cursor:pointer;transition:transform var(--transition),box-shadow var(--transition);
  box-shadow:var(--shadow-soft);}
.drill-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-card);}
.deck-stat-card{background:var(--surface-card);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;box-shadow:var(--shadow-soft);}
.deck-stat-name{font-size:0.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
.deck-stat-bar{height:6px;background:var(--lavender-100);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.deck-stat-fill{height:100%;background:linear-gradient(90deg,var(--wisteria),var(--lavender-300));border-radius:3px;transition:width 0.5s ease;}
.deck-stat-num{font-size:0.72rem;color:var(--text-secondary);}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.shake-wrong{animation:shake 0.5s ease;}
</style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" fill="url(#hg-grad)"/>
        <path d="M14 6 C14 6 10 10 10 13 C10 15.2 11.8 17 14 17 C16.2 17 18 15.2 18 13 C18 10 14 6 14 6Z" fill="white" opacity="0.9"/>
        <path d="M9 13 C9 13 7 15 8 17.5 C8.8 19.5 11 20 14 20 C17 20 19.2 19.5 20 17.5 C21 15 19 13 19 13" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
        <defs><linearGradient id="hg-grad" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs>
      </svg>
      <div>
        <div class="brand-title">Hangul Garden</div>
        <div class="brand-sub">Reading Fluency</div>
      </div>
    </div>
    <div class="header-right">
      <div class="garden-badge" id="gardenBadge">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="3" fill="#a78bfa"/><path d="M7 2v2M7 10v2M2 7h2M10 7h2M3.5 3.5l1.4 1.4M9.1 9.1l1.4 1.4M9.1 4.9l-1.4 1.4M4.9 9.1 3.5 10.5" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span id="gardenLabel">Seed</span>
      </div>
      <div class="due-badge hidden" id="dueBadge">0 due</div>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.9 2.9l1.4 1.4M11.7 11.7l1.4 1.4M11.7 4.3l-1.4 1.4M4.3 11.7l-1.4 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>
  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-mode="quiz">Quiz</button>
    <button class="tab" data-mode="drill">Reading Drill</button>
    <button class="tab" data-mode="speed">Speed Round</button>
    <button class="tab" data-mode="garden">Garden</button>
  </div>
  <!-- QUIZ MODE -->
  <div class="section active" id="sec-quiz">
    <div class="deck-selector" id="deckSelector"></div>
    <div class="progress-row">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>

/* ============================================================
   6. STORAGE ENGINE
   ============================================================ */
const STORAGE_KEY = 'hangul_garden_v2';

function defaultState() {
  return {
    progress: {},       // { cardId: { correctCount, wrongCount, masteryLevel, nextReview } }
    settings: { dark: false, anim: true, sound: true },
    currentDeck: 'vowels',
    currentIndex: 0,
    answered: {},       // { cardId: chosenOption }
    deckOrder: []       // shuffled card ID order for current deck
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch(e) { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch(e) {}
}

function getProgress(id) {
  return STATE.progress[id] || { correctCount:0, wrongCount:0, masteryLevel:0, nextReview:0 };
}

let STATE = loadState();

/* ============================================================
   7. SRS ENGINE
   ============================================================ */
const SRS_INTERVALS = [5*60*1000, 24*60*60*1000, 3*24*60*60*1000, 7*24*60*60*1000, 30*24*60*60*1000];

function updateSRS(id, correct) {
  const p = getProgress(id);
  const now = Date.now();
  if (correct) {
    p.correctCount++;
    p.masteryLevel = Math.min(p.masteryLevel + 1, 4);
  } else {
    p.wrongCount++;
    p.masteryLevel = Math.max(p.masteryLevel - 1, 0);
  }
  p.nextReview = now + SRS_INTERVALS[correct ? p.masteryLevel : 0];
  STATE.progress[id] = p;
  saveState();
}

function getDueCount() {
  const now = Date.now();
  return CARDS.filter(c => {
    const p = getProgress(c.id);
    return p.nextReview > 0 && p.nextReview <= now;
  }).length;
}

function getMasteryLevel() {
  if (!CARDS.length) return 0;
  const total = CARDS.reduce((sum, c) => sum + getProgress(c.id).masteryLevel, 0);
  return total / (CARDS.length * 4);
}

function getGardenStage() {
  const m = getMasteryLevel();
  if (m < 0.05) return {stage:'Seed',label:'Seed',pct:m};
  if (m < 0.25) return {stage:'Bud',label:'Bud',pct:m};
  if (m < 0.50) return {stage:'Flower',label:'Flower',pct:m};
  if (m < 0.80) return {stage:'Bloom',label:'Bloom',pct:m};
  return {stage:'Garden',label:'Garden',pct:m};
}

/* ============================================================
   8. QUIZ ENGINE
   ============================================================ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDeckCards(deck) {
  return CARDS.filter(c => c.deck === deck);
}

function initQuiz(deck) {
  STATE.currentDeck = deck;
  STATE.currentIndex = 0;
  STATE.answered = STATE.answered || {};
  // Shuffle the deck order for this session
  const cards = getDeckCards(deck);
  STATE.deckOrder = shuffle(cards.map(c => c.id));
  saveState();
  renderQuiz();
}

function getCurrentDeck() {
  const allCards = getDeckCards(STATE.currentDeck);
  if (!allCards.length) return [];
  const order = STATE.deckOrder && STATE.deckOrder.length === allCards.length
    ? STATE.deckOrder : allCards.map(c => c.id);
  return order.map(id => CARDS.find(c => c.id === id)).filter(Boolean);
}

function renderQuiz() {
  const deck = getCurrentDeck();
  if (!deck.length) return;
  const idx = Math.max(0, Math.min(STATE.currentIndex, deck.length - 1));
  const card = deck[idx];

  // Progress
  const answered = deck.filter(c => STATE.answered[c.id] !== undefined).length;
  document.getElementById('progressFill').style.width = (answered / deck.length * 100) + '%';
  document.getElementById('progressLabel').textContent = answered + ' / ' + deck.length + ' answered';

  // Card content (only written once per card — stable, no reflow)
  const deckNames = {vowels:'Vowels',consonants:'Consonants',combined:'Combined Vowels',double:'Double Consonants',batchim:'Batchim',syllables:'Syllables',words:'Words'};
  document.getElementById('cardDeckTag').textContent = deckNames[card.deck] || card.deck;
  document.getElementById('cardKorean').textContent = card.korean;
  document.getElementById('cardHint').textContent = '';
  document.getElementById('audioBtn').onclick = () => speakKorean(card.korean);

  // Shuffle options once per card and cache on the card object so they stay stable
  if (!card._shuffledOpts) card._shuffledOpts = shuffle(card.options.slice(0, 4));

  // Options grid — rendered fresh per card, not per answer
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  card._shuffledOpts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(opt, card);
    grid.appendChild(btn);
  });

  // Clear feedback
  const fb = document.getElementById('feedbackArea');
  fb.innerHTML = '';

  // Nav buttons
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === deck.length - 1;
  const nextUnanswered = deck.findIndex((c, i) => i > idx && STATE.answered[c.id] === undefined);
  document.getElementById('nextUnansweredBtn').disabled = nextUnanswered === -1;

  // If this card was already answered (e.g. navigating back), show state
  if (STATE.answered[card.id] !== undefined) applyAnswer(card, STATE.answered[card.id]);
}

function applyAnswer(card, chosen) {
  // Update options in place — no touching the question card
  const grid = document.getElementById('optionsGrid');
  Array.from(grid.children).forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === card.answer) btn.classList.add('correct');
    else if (btn.textContent === chosen && chosen !== card.answer) btn.classList.add('wrong');
  });

  // Show feedback below — completely outside the question card
  const isCorrect = chosen === card.answer;
  const fb = document.getElementById('feedbackArea');
  fb.innerHTML = `
    <div class="feedback-card ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
      <div class="feedback-title">${isCorrect ? 'Correct' : 'Incorrect — it\'s "' + card.answer + '"'}</div>
      <div class="feedback-explanation">${card.explanation || ''}</div>
      ${card.breakdown ? '<div class="feedback-breakdown">' + card.breakdown + '</div>' : ''}
      ${card.examples && card.examples.length ? '<div class="feedback-examples">' + card.examples.map(e =>
        `<span class="example-item"><strong>${e.k}</strong>${e.r ? ' ('+e.r+')' : ''} — ${e.m}</span>`
      ).join('') + '</div>' : ''}
    </div>`;

  // Update nav
  const deck = getCurrentDeck();
  const idx = STATE.currentIndex;
  const nextUnanswered = deck.findIndex((c, i) => i > idx && STATE.answered[c.id] === undefined);
  document.getElementById('nextUnansweredBtn').disabled = nextUnanswered === -1;
  document.getElementById('progressFill').style.width =
    (deck.filter(c => STATE.answered[c.id] !== undefined).length / deck.length * 100) + '%';
  document.getElementById('progressLabel').textContent =
    deck.filter(c => STATE.answered[c.id] !== undefined).length + ' / ' + deck.length + ' answered';
}

function handleAnswer(chosen, card) {
  if (STATE.answered[card.id] !== undefined) return; // already answered
  const isCorrect = chosen === card.answer;
  STATE.answered[card.id] = chosen;
  updateSRS(card.id, isCorrect);

  // Animate the question card
  const qCard = document.getElementById('questionCard');
  if (STATE.settings.anim) {
    qCard.classList.remove('bloom-ripple', 'shake-wrong');
    void qCard.offsetWidth;
    qCard.classList.add(isCorrect ? 'bloom-ripple' : 'shake-wrong');
    setTimeout(() => qCard.classList.remove('bloom-ripple', 'shake-wrong'), 700);
  }

  // Update options + show feedback WITHOUT re-rendering the question card
  applyAnswer(card, chosen);
  saveState();
  updateGardenBadge();
  updateDueBadge();
}

/* ============================================================
   9. READING DRILL ENGINE
   ============================================================ */
let drillCards = [];

function getDrillCards(difficulty) {
  let pool;
  if (difficulty === 'easy') pool = CARDS.filter(c => c.deck === 'vowels' || c.deck === 'consonants');
  else if (difficulty === 'medium') pool = CARDS.filter(c => c.deck === 'syllables' || c.deck === 'batchim' || c.deck === 'combined');
  else pool = CARDS.filter(c => c.deck === 'words' || c.deck === 'syllables');
  // Shuffle
  const arr = pool.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, 12);
}

function renderDrill() {
  const diff = document.getElementById('difficultySelect').value;
  drillCards = getDrillCards(diff);
  const grid = document.getElementById('drillGrid');
  grid.innerHTML = '';
  drillCards.forEach(card => {
    const item = document.createElement('div');
    item.className = 'drill-item';
    item.innerHTML = `<div class="drill-korean">${card.korean}</div><div class="drill-roman hidden">${card.answer}</div>`;
    item.onclick = () => {
      const r = item.querySelector('.drill-roman');
      r.classList.toggle('hidden');
      speakKorean(card.korean);
    };
    grid.appendChild(item);
  });
  document.getElementById('revealAllBtn').textContent = 'Reveal All';
}

function revealAll() {
  const btn = document.getElementById('revealAllBtn');
  const allHidden = document.querySelectorAll('#drillGrid .drill-roman.hidden');
  if (allHidden.length > 0) {
    document.querySelectorAll('#drillGrid .drill-roman').forEach(el => el.classList.remove('hidden'));
    btn.textContent = 'Hide All';
  } else {
    document.querySelectorAll('#drillGrid .drill-roman').forEach(el => el.classList.add('hidden'));
    btn.textContent = 'Reveal All';
  }
}

/* ============================================================
   10. SPEED ROUND ENGINE
   ============================================================ */
let speedState = {
  cards: [], idx: 0, startTime: 0, cardStartTime: 0,
  responseTimes: [], correct: 0, wrong: 0, timer: null, timeLeft: 60
};

function startSpeedRound() {
  document.getElementById('speedStart').classList.add('hidden');
  document.getElementById('speedGame').classList.remove('hidden');
  document.getElementById('speedSummary').classList.add('hidden');

  const pool = CARDS.slice();
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  speedState = {
    cards: pool.slice(0, 20), idx: 0, startTime: Date.now(),
    cardStartTime: Date.now(), responseTimes: [], correct: 0, wrong: 0,
    timer: null, timeLeft: 60
  };

  speedState.timer = setInterval(() => {
    speedState.timeLeft--;
    document.getElementById('speedTimer').textContent = speedState.timeLeft + 's';
    if (speedState.timeLeft <= 0) endSpeedRound();
  }, 1000);

  renderSpeedCard();
}

function renderSpeedCard() {
  if (speedState.idx >= speedState.cards.length) { endSpeedRound(); return; }
  const card = speedState.cards[speedState.idx];
  document.getElementById('speedCounter').textContent = (speedState.idx + 1) + ' / ' + speedState.cards.length;
  document.getElementById('speedKorean').textContent = card.korean;
  speedState.cardStartTime = Date.now();

  const opts = document.getElementById('speedOptions');
  opts.innerHTML = '';
  shuffle(card.options.slice(0,4)).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => handleSpeedAnswer(opt, card);
    opts.appendChild(btn);
  });
}

function handleSpeedAnswer(chosen, card) {
  const rt = Date.now() - speedState.cardStartTime;
  speedState.responseTimes.push(rt);
  const isCorrect = chosen === card.answer;
  if (isCorrect) speedState.correct++; else speedState.wrong++;
  updateSRS(card.id, isCorrect);

  // Flash feedback
  const sk = document.getElementById('speedKorean');
  const color = isCorrect ? 'var(--sage)' : '#e57373';
  sk.style.color = color;
  setTimeout(() => { sk.style.color = ''; }, 300);

  speedState.idx++;
  setTimeout(renderSpeedCard, 350);
}

function endSpeedRound() {
  clearInterval(speedState.timer);
  document.getElementById('speedGame').classList.add('hidden');
  document.getElementById('speedSummary').classList.remove('hidden');

  const total = speedState.correct + speedState.wrong;
  const accuracy = total ? Math.round(speedState.correct / total * 100) : 0;
  const avgRt = speedState.responseTimes.length
    ? Math.round(speedState.responseTimes.reduce((a,b) => a+b, 0) / speedState.responseTimes.length / 100) / 10
    : 0;
  const score = speedState.correct * 10 - speedState.wrong * 3;

  document.getElementById('summaryStats').innerHTML = `
    <div class="stat-item"><div class="stat-val">${speedState.correct}</div><div class="stat-label">Correct</div></div>
    <div class="stat-item"><div class="stat-val">${speedState.wrong}</div><div class="stat-label">Wrong</div></div>
    <div class="stat-item"><div class="stat-val">${accuracy}%</div><div class="stat-label">Accuracy</div></div>
    <div class="stat-item"><div class="stat-val">${avgRt}s</div><div class="stat-label">Avg Time</div></div>
    <div class="stat-item"><div class="stat-val">${Math.max(0,score)}</div><div class="stat-label">Score</div></div>
  `;
  updateGardenBadge();
  updateDueBadge();
}

/* ============================================================
   11. RENDERING — Garden, Stats, Badges
   ============================================================ */
function renderGardenSVG() {
  const wrap = document.getElementById('gardenSvgWrap');
  const gs = getGardenStage();
  const mastery = getMasteryLevel();
  const totalFlowers = Math.max(1, Math.floor(mastery * 30));
  const desc = document.getElementById('gardenDesc');

  const stageMessages = {
    Seed: 'Your garden is just a seed. Keep practicing!',
    Bud: 'Tiny buds are sprouting. You\'re making progress!',
    Flower: 'Beautiful flowers are blooming in your garden!',
    Bloom: 'Your garden is in full bloom — magnificent!',
    Garden: 'A breathtaking garden of Korean mastery!'
  };
  desc.textContent = stageMessages[gs.stage] || '';

  // Build SVG
  const W = 320, H = 160;
  let flowers = '';
  const flowerPositions = [];
  for (let i = 0; i < totalFlowers; i++) {
    const x = 20 + (i % 8) * 37;
    const y = 30 + Math.floor(i / 8) * 45;
    const hue = 260 + (i * 17) % 80;
    const size = 8 + (i % 3) * 3;
    flowerPositions.push({x, y, hue, size});
  }

  flowers = flowerPositions.map(({x, y, hue, size}) => {
    const petals = [0,60,120,180,240,300].map(angle => {
      const rad = angle * Math.PI / 180;
      const px = x + Math.cos(rad) * size * 0.7;
      const py = y + Math.sin(rad) * size * 0.7;
      return `<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${(size*0.5).toFixed(1)}" ry="${(size*0.35).toFixed(1)}"
        transform="rotate(${angle}, ${px.toFixed(1)}, ${py.toFixed(1)})"
        fill="hsl(${hue},55%,72%)" opacity="0.85"/>`;
    }).join('');
    const stem = `<line x1="${x}" y1="${y+size*0.4}" x2="${x}" y2="${y+size*0.4+20}" stroke="hsl(140,35%,55%)" stroke-width="1.5"/>`;
    const center = `<circle cx="${x}" cy="${y}" r="${(size*0.32).toFixed(1)}" fill="hsl(50,80%,70%)"/>`;
    return `<g>${petals}${stem}${center}</g>`;
  }).join('');

  // Ground
  const ground = `<ellipse cx="${W/2}" cy="${H-10}" rx="${W/2-10}" ry="12" fill="hsl(140,30%,75%)" opacity="0.3"/>`;
  // Seeds (if early stage)
  const seeds = gs.stage === 'Seed' ? `<circle cx="${W/2-20}" cy="${H-18}" r="4" fill="hsl(30,50%,60%)" opacity="0.5"/>
    <circle cx="${W/2}" cy="${H-20}" r="5" fill="hsl(30,50%,55%)" opacity="0.5"/>
    <circle cx="${W/2+25}" cy="${H-17}" r="3" fill="hsl(30,50%,60%)" opacity="0.5"/>` : '';

  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;">
    ${ground}${flowers}${seeds}
  </svg>`;
}

function renderDeckStats() {
  const container = document.getElementById('deckStats');
  const deckList = ['vowels','consonants','combined','double','batchim','syllables','words'];
  const deckNames = {vowels:'Vowels',consonants:'Consonants',combined:'Combined',double:'Double Cons.',batchim:'Batchim',syllables:'Syllables',words:'Words'};
  container.innerHTML = '';
  deckList.forEach(dk => {
    const cards = getDeckCards(dk);
    const mastered = cards.filter(c => getProgress(c.id).masteryLevel >= 3).length;
    const pct = cards.length ? Math.round(mastered / cards.length * 100) : 0;
    const div = document.createElement('div');
    div.className = 'deck-stat-card';
    div.innerHTML = `<div class="deck-stat-name">${deckNames[dk]}</div>
      <div class="deck-stat-bar"><div class="deck-stat-fill" style="width:${pct}%"></div></div>
      <div class="deck-stat-num">${mastered}/${cards.length}</div>`;
    container.appendChild(div);
  });
}

function updateGardenBadge() {
  const gs = getGardenStage();
  const pct = Math.round(gs.pct * 100);
  const label = document.getElementById('gardenLabel');
  if (label) label.textContent = gs.stage + ' · ' + pct + '%';
  const gardenTab = document.querySelector('[data-mode="garden"]');
  if (gardenTab && gardenTab.classList.contains('active')) {
    renderGardenSVG();
    renderDeckStats();
  }
}

function updateDueBadge() {
  const due = getDueCount();
  const badge = document.getElementById('dueBadge');
  if (due > 0) {
    badge.textContent = due + ' due';
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

/* ============================================================
   12. AUDIO
   ============================================================ */
function speakKorean(text) {
  if (!STATE.settings.sound) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ko-KR';
  utt.rate = 0.85;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

/* ============================================================
   13. SETTINGS
   ============================================================ */
function applySettings() {
  const s = STATE.settings;
  document.documentElement.setAttribute('data-theme', s.dark ? 'dark' : '');
  document.getElementById('toggleDark').classList.toggle('on', s.dark);
  document.getElementById('toggleAnim').classList.toggle('on', s.anim);
  document.getElementById('toggleSound').classList.toggle('on', s.sound);
  if (!s.anim) document.documentElement.setAttribute('data-no-anim','1');
  else document.documentElement.removeAttribute('data-no-anim');
}

/* ============================================================
   14. BUILD DECK SELECTOR
   ============================================================ */
function buildDeckSelector() {
  const deckList = [
    {id:'vowels',label:'Vowels'},
    {id:'consonants',label:'Consonants'},
    {id:'combined',label:'Combined Vowels'},
    {id:'double',label:'Double Consonants'},
    {id:'batchim',label:'Batchim'},
    {id:'syllables',label:'Syllables'},
    {id:'words',label:'Common Words'},
  ];
  const sel = document.getElementById('deckSelector');
  sel.innerHTML = '';
  deckList.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'deck-btn' + (d.id === STATE.currentDeck ? ' active' : '');
    btn.textContent = d.label;
    btn.onclick = () => {
      document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      STATE.answered = {};
      initQuiz(d.id);
    };
    sel.appendChild(btn);
  });
}

/* ============================================================
   15. EVENT HANDLERS
   ============================================================ */
// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const mode = tab.dataset.mode;
    ['quiz','drill','speed','garden'].forEach(m => {
      const sec = document.getElementById('sec-' + m);
      if (sec) sec.classList.toggle('active', m === mode);
    });
    if (mode === 'garden') { renderGardenSVG(); renderDeckStats(); }
    if (mode === 'drill') renderDrill();
  };
});

// Quiz nav
document.getElementById('prevBtn').onclick = () => {
  const deck = getDeckCards(STATE.currentDeck);
  if (STATE.currentIndex > 0) { STATE.currentIndex--; renderQuiz(); }
};
document.getElementById('nextBtn').onclick = () => {
  const deck = getDeckCards(STATE.currentDeck);
  if (STATE.currentIndex < deck.length - 1) { STATE.currentIndex++; renderQuiz(); }
};
document.getElementById('nextUnansweredBtn').onclick = () => {
  const deck = getDeckCards(STATE.currentDeck);
  const next = deck.findIndex((c, i) => i > STATE.currentIndex && STATE.answered[c.id] === undefined);
  if (next !== -1) { STATE.currentIndex = next; renderQuiz(); }
};
document.getElementById('restartBtn').onclick = () => {
  STATE.answered = {};
  STATE.currentIndex = 0;
  saveState();
  renderQuiz();
};

// Drill controls
document.getElementById('revealAllBtn').onclick = revealAll;
document.getElementById('refreshDrillBtn').onclick = renderDrill;
document.getElementById('difficultySelect').onchange = renderDrill;

// Speed round
document.getElementById('startSpeedBtn').onclick = startSpeedRound;
document.getElementById('playAgainBtn').onclick = () => {
  document.getElementById('speedSummary').classList.add('hidden');
  document.getElementById('speedStart').classList.remove('hidden');
};

// Settings
document.getElementById('settingsBtn').onclick = () => {
  document.getElementById('settingsOverlay').classList.remove('hidden');
};
document.getElementById('closeSettingsBtn').onclick = () => {
  document.getElementById('settingsOverlay').classList.add('hidden');
};
document.getElementById('toggleDark').onclick = function() {
  STATE.settings.dark = !STATE.settings.dark;
  saveState();
  applySettings();
};
document.getElementById('toggleAnim').onclick = function() {
  STATE.settings.anim = !STATE.settings.anim;
  saveState();
  applySettings();
};
document.getElementById('toggleSound').onclick = function() {
  STATE.settings.sound = !STATE.settings.sound;
  saveState();
  applySettings();
};
document.getElementById('resetProgressBtn').onclick = () => {
  if (confirm('Reset all progress? This cannot be undone.')) {
    STATE = defaultState();
    saveState();
    buildDeckSelector();
    initQuiz(STATE.currentDeck);
    updateGardenBadge();
    updateDueBadge();
    document.getElementById('settingsOverlay').classList.add('hidden');
  }
};

/* ============================================================
   16. INIT
   ============================================================ */
applySettings();
buildDeckSelector();
initQuiz(STATE.currentDeck);
updateGardenBadge();
updateDueBadge();
renderDrill();

</script>
</body>
</html>
